<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180">
  <defs>
    <style>
      .bg { fill: #1a1b26; }
      .chrome { fill: #24283b; }
      .dot-r { fill: #f7768e; }
      .dot-y { fill: #e0af68; }
      .dot-g { fill: #9ece6a; }
      .prompt { fill: #7aa2f7; font: bold 13px 'Cascadia Code', 'Consolas', monospace; }
      .cmd { fill: #c0caf5; font: 13px 'Cascadia Code', 'Consolas', monospace; }
      .ghost { fill: #565f89; font: 13px 'Cascadia Code', 'Consolas', monospace; }
      .out { fill: #9ece6a; font: 13px 'Cascadia Code', 'Consolas', monospace; }
      .dim { fill: #565f89; font: 13px 'Cascadia Code', 'Consolas', monospace; }
      .title { fill: #a9b1d6; font: 12px 'Segoe UI', sans-serif; }
      .cursor { fill: #7aa2f7; }
      .key-box { fill: #414868; rx: 3; }
      .key-txt { fill: #c0caf5; font: bold 11px 'Segoe UI', sans-serif; }

      /* line 1: prompt + typed text builds up */
      .t1  { animation: show 0s 0.3s both; }
      .t2  { animation: show 0s 0.7s both; }
      .t3  { animation: show 0s 1.1s both; }
      .t4  { animation: show 0s 1.5s both; }
      .t5  { animation: show 0s 1.9s both; }
      .t6  { animation: show 0s 2.3s both; }
      .t7  { animation: show 0s 2.7s both; }
      .t8  { animation: show 0s 3.1s both; }
      /* ghost text */
      .gh  { animation: show 0s 3.4s both; }
      /* key hint */
      .kh  { animation: show 0s 3.4s both; }
      /* cursor blink while typing */
      .cur1 { animation: cur1anim 3.4s steps(1) both; }
      /* after End pressed: ghost becomes solid, cursor moves right */
      .accepted { animation: show 0s 4.0s both; }
      .cur2 { animation: show 0s 4.0s both; }
      /* result line */
      .res { animation: show 0s 4.6s both; }
      /* second example */
      .e2a { animation: show 0s 5.6s both; }
      .e2g { animation: show 0s 6.2s both; }
      .e2k { animation: show 0s 6.2s both; }
      .e2acc { animation: show 0s 6.8s both; }

      @keyframes show { from { opacity:0 } to { opacity:1 } }
      @keyframes cur1anim {
        0%   { opacity:1 }
        20%  { opacity:0 }
        40%  { opacity:1 }
        60%  { opacity:0 }
        80%  { opacity:1 }
        99%  { opacity:1 }
        100% { opacity:0 }
      }
    </style>
  </defs>

  <!-- window -->
  <rect width="720" height="180" rx="10" class="bg"/>
  <rect width="720" height="32" rx="10" class="chrome"/>
  <rect y="22" width="720" height="10" class="chrome"/>
  <circle cx="20" cy="16" r="6" class="dot-r"/>
  <circle cx="40" cy="16" r="6" class="dot-y"/>
  <circle cx="60" cy="16" r="6" class="dot-g"/>
  <text x="360" y="21" text-anchor="middle" class="title">PSReadLine — Ghost Text Autocomplete</text>

  <!-- row 1: prompt -->
  <text x="20" y="62" class="prompt">❯</text>

  <!-- typed characters appear one by one -->
  <text x="36" y="62" class="cmd t1">g</text>
  <text x="44" y="62" class="cmd t2">i</text>
  <text x="52" y="62" class="cmd t3">t</text>
  <text x="60" y="62" class="cmd t4"> </text>
  <text x="68" y="62" class="cmd t5">c</text>
  <text x="76" y="62" class="cmd t6">h</text>
  <text x="84" y="62" class="cmd t7">e</text>
  <text x="92" y="62" class="cmd t8">c</text>

  <!-- cursor blink while typing -->
  <rect x="100" y="49" width="7" height="16" rx="1" class="cursor cur1"/>

  <!-- ghost text suggestion -->
  <text x="100" y="62" class="ghost gh">kout feat/r2-upload-health-endpoints</text>

  <!-- key hint -->
  <rect x="20" y="73" width="34" height="16" rx="3" class="key-box kh"/>
  <text x="37" y="85" text-anchor="middle" class="key-txt kh">End</text>
  <text x="60" y="85" class="dim kh">accept full suggestion</text>

  <rect x="200" y="73" width="19" height="16" rx="3" class="key-box kh"/>
  <text x="209" y="85" text-anchor="middle" class="key-txt kh">→</text>
  <text x="225" y="85" class="dim kh">accept word by word</text>

  <!-- after End: full command accepted -->
  <text x="36" y="62" class="cmd accepted">git checkout feat/r2-upload-health-endpoints</text>
  <rect x="388" y="49" width="7" height="16" rx="1" class="cursor cur2"/>

  <!-- result -->
  <text x="20" y="110" class="out res">Switched to branch 'feat/r2-upload-health-endpoints'</text>

  <!-- example 2 -->
  <text x="20" y="135" class="prompt e2a">❯</text>
  <text x="36" y="135" class="cmd e2a">gco</text>
  <text x="60" y="135" class="cmd e2a"> m</text>
  <text x="76" y="135" class="ghost e2g">ain</text>
  <rect x="20" y="146" width="34" height="16" rx="3" class="key-box e2k"/>
  <text x="37" y="158" text-anchor="middle" class="key-txt e2k">End</text>
  <text x="60" y="158" class="dim e2k">→</text>
  <text x="36" y="135" class="cmd e2acc">main</text>
</svg>
