<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <style>
      .bg     { fill: #1a1b26; }
      .chrome { fill: #24283b; }
      .dot-r  { fill: #f7768e; }
      .dot-y  { fill: #e0af68; }
      .dot-g  { fill: #9ece6a; }
      .title  { fill: #a9b1d6; font: 12px 'Segoe UI',sans-serif; }
      .mono   { font: 13px 'Cascadia Code','Consolas',monospace; }
      .border { fill: #7aa2f7; }
      .header { fill: #7aa2f7; }
      .dim    { fill: #565f89; }
      .white  { fill: #c0caf5; }
      .cyan   { fill: #73daca; }
      .green  { fill: #9ece6a; }
      .yellow { fill: #e0af68; }
      .red    { fill: #f7768e; }
      .gray   { fill: #a9b1d6; }
      .cursor { fill: #e0af68; }
      .sel-on { fill: #73daca; }
      .sel-off{ fill: #565f89; }

      /* Timing: header → menu items → nav → install output */
      .h0  { animation: fd 0s 0.2s both; }
      .h1  { animation: fd 0s 0.4s both; }
      .h2  { animation: fd 0s 0.6s both; }
      .h3  { animation: fd 0s 0.8s both; }
      .h4  { animation: fd 0s 1.0s both; }
      .m0  { animation: fd 0s 1.3s both; }
      .m1  { animation: fd 0s 1.5s both; }
      .m2  { animation: fd 0s 1.7s both; }
      .m3  { animation: fd 0s 1.9s both; }
      .m4  { animation: fd 0s 2.1s both; }
      .m5  { animation: fd 0s 2.3s both; }
      .m6  { animation: fd 0s 2.5s both; }
      .m7  { animation: fd 0s 2.7s both; }
      .nav { animation: fd 0s 3.0s both; }

      /* Cursor moves down row by row */
      .cur0 { animation: cur0a 8s 1.3s steps(1) infinite; }
      .cur1 { animation: cur1a 8s 1.3s steps(1) infinite; }
      .cur2 { animation: cur2a 8s 1.3s steps(1) infinite; }
      .cur3 { animation: cur3a 8s 1.3s steps(1) infinite; }
      .cur4 { animation: cur4a 8s 1.3s steps(1) infinite; }
      .cur5 { animation: cur5a 8s 1.3s steps(1) infinite; }
      .cur6 { animation: cur6a 8s 1.3s steps(1) infinite; }
      .cur7 { animation: cur7a 8s 1.3s steps(1) infinite; }

      /* Install output */
      .i0  { animation: fd 0s 5.0s both; }
      .i1  { animation: fd 0s 5.5s both; }
      .i2  { animation: fd 0s 6.0s both; }
      .i3  { animation: fd 0s 6.5s both; }
      .i4  { animation: fd 0s 7.0s both; }
      .i5  { animation: fd 0s 7.5s both; }
      .i6  { animation: fd 0s 8.0s both; }
      .i7  { animation: fd 0s 8.5s both; }
      .i8  { animation: fd 0s 9.0s both; }

      /* menu fades out, install fades in */
      .menu-block { animation: menuHide 0s 4.6s both; }
      .inst-block { animation: fd 0s 4.8s both; }

      @keyframes fd { from{opacity:0} to{opacity:1} }
      @keyframes menuHide { from{opacity:1} to{opacity:0} }

      @keyframes cur0a { 0%{opacity:1} 12.5%{opacity:0} 100%{opacity:0} }
      @keyframes cur1a { 0%{opacity:0} 12.5%{opacity:1} 25%{opacity:0}  100%{opacity:0} }
      @keyframes cur2a { 0%{opacity:0} 25%{opacity:1}  37.5%{opacity:0} 100%{opacity:0} }
      @keyframes cur3a { 0%{opacity:0} 37.5%{opacity:1} 50%{opacity:0}  100%{opacity:0} }
      @keyframes cur4a { 0%{opacity:0} 50%{opacity:1}  62.5%{opacity:0} 100%{opacity:0} }
      @keyframes cur5a { 0%{opacity:0} 62.5%{opacity:1} 75%{opacity:0}  100%{opacity:0} }
      @keyframes cur6a { 0%{opacity:0} 75%{opacity:1}  87.5%{opacity:0} 100%{opacity:0} }
      @keyframes cur7a { 0%{opacity:0} 87.5%{opacity:1} 100%{opacity:1} }
    </style>
  </defs>

  <!-- Window -->
  <rect width="720" height="460" rx="10" class="bg"/>
  <rect width="720" height="32" rx="10" class="chrome"/>
  <rect y="22" width="720" height="10" class="chrome"/>
  <circle cx="20" cy="16" r="6" class="dot-r"/>
  <circle cx="40" cy="16" r="6" class="dot-y"/>
  <circle cx="60" cy="16" r="6" class="dot-g"/>
  <text x="360" y="21" text-anchor="middle" class="title">Install-Profile.ps1  v0.0.1</text>

  <!-- ══ HEADER ══ -->
  <text x="30" y="58"  class="mono border h0">╔══════════════════════════════════════════════════╗</text>
  <text x="30" y="75"  class="mono border h1">║</text>
  <text x="42" y="75"  class="mono header h1">  PowerShell Profile Installer  v0.0.1          </text>
  <text x="638" y="75" class="mono border h1">║</text>
  <text x="30" y="92"  class="mono border h2">║</text>
  <text x="42" y="92"  class="mono dim h2">  github.com/LinhDangDev/Config-Oh-My-Posh       </text>
  <text x="638" y="92" class="mono border h2">║</text>
  <text x="30" y="109" class="mono border h3">╚══════════════════════════════════════════════════╝</text>

  <!-- Nav hint -->
  <text x="30" y="128" class="mono dim nav">  Use ↑↓ to navigate · SPACE toggle · ENTER install · Q quit</text>

  <!-- ══ MENU BLOCK (fades out before install) ══ -->
  <g class="menu-block">
    <!-- Row 0 -->
    <text x="30" y="152" class="mono cursor cur0">▶</text>
    <text x="30" y="152" class="mono dim cur1"> </text>
    <text x="30" y="152" class="mono dim cur2"> </text>
    <text x="30" y="152" class="mono dim cur3"> </text>
    <text x="30" y="152" class="mono dim cur4"> </text>
    <text x="30" y="152" class="mono dim cur5"> </text>
    <text x="30" y="152" class="mono dim cur6"> </text>
    <text x="30" y="152" class="mono dim cur7"> </text>
    <text x="44" y="152" class="mono sel-on m0">[●]</text>
    <text x="76" y="152" class="mono white m0"> Core Profile (PSReadLine, UTF-8, git/yarn shortcuts)</text>
    <text x="600" y="152" class="mono red m0"> [required]</text>

    <!-- Row 1 -->
    <text x="30" y="170" class="mono dim m1"> </text>
    <text x="30" y="170" class="mono cursor cur1">▶</text>
    <text x="30" y="170" class="mono dim cur2"> </text>
    <text x="30" y="170" class="mono dim cur3"> </text>
    <text x="30" y="170" class="mono dim cur4"> </text>
    <text x="30" y="170" class="mono dim cur5"> </text>
    <text x="30" y="170" class="mono dim cur6"> </text>
    <text x="30" y="170" class="mono dim cur7"> </text>
    <text x="44" y="170" class="mono sel-on m1">[●]</text>
    <text x="76" y="170" class="mono gray m1"> Oh My Posh  (prompt theme — requires Nerd Font)</text>

    <!-- Row 2 -->
    <text x="30" y="188" class="mono dim m2"> </text>
    <text x="30" y="188" class="mono dim m2"> </text>
    <text x="30" y="188" class="mono cursor cur2">▶</text>
    <text x="30" y="188" class="mono dim cur3"> </text>
    <text x="30" y="188" class="mono dim cur4"> </text>
    <text x="30" y="188" class="mono dim cur5"> </text>
    <text x="30" y="188" class="mono dim cur6"> </text>
    <text x="30" y="188" class="mono dim cur7"> </text>
    <text x="44" y="188" class="mono sel-on m2">[●]</text>
    <text x="76" y="188" class="mono gray m2"> Nerd Font   (CaskaydiaCove — needed for icons)</text>

    <!-- Row 3 -->
    <text x="30" y="206" class="mono dim m3"> </text>
    <text x="30" y="206" class="mono cursor cur3">▶</text>
    <text x="44" y="206" class="mono sel-on m3">[●]</text>
    <text x="76" y="206" class="mono gray m3"> Terminal-Icons  (file icons in ls/ll output)</text>

    <!-- Row 4 -->
    <text x="30" y="224" class="mono dim m4"> </text>
    <text x="30" y="224" class="mono cursor cur4">▶</text>
    <text x="44" y="224" class="mono sel-on m4">[●]</text>
    <text x="76" y="224" class="mono gray m4"> PSReadLine   (autocomplete, ghost text, syntax colors)</text>

    <!-- Row 5 -->
    <text x="30" y="242" class="mono dim m5"> </text>
    <text x="30" y="242" class="mono cursor cur5">▶</text>
    <text x="44" y="242" class="mono sel-on m5">[●]</text>
    <text x="76" y="242" class="mono gray m5"> Zoxide       (smart cd — z keyword to jump)</text>

    <!-- Row 6 -->
    <text x="30" y="260" class="mono dim m6"> </text>
    <text x="30" y="260" class="mono cursor cur6">▶</text>
    <text x="44" y="260" class="mono sel-off m6">[○]</text>
    <text x="76" y="260" class="mono gray m6"> lazydocker   (Docker TUI — dmon command)</text>

    <!-- Row 7 -->
    <text x="30" y="278" class="mono dim m7"> </text>
    <text x="30" y="278" class="mono cursor cur7">▶</text>
    <text x="44" y="278" class="mono sel-off m7">[○]</text>
    <text x="76" y="278" class="mono gray m7"> BurntToast   (desktop notifications)</text>
  </g>

  <!-- ══ INSTALL OUTPUT BLOCK ══ -->
  <g class="inst-block">
    <text x="30" y="152" class="mono cyan i0">  Installing selected components...</text>

    <text x="30" y="176" class="mono cyan i1">  ─── Core Profile</text>
    <text x="30" y="193" class="mono green i2">  ✓ Done</text>

    <text x="30" y="217" class="mono cyan i3">  ─── Oh My Posh</text>
    <text x="30" y="234" class="mono yellow i3">  → Installing Oh My Posh via winget...</text>
    <text x="30" y="251" class="mono green i4">  ✓ Done</text>

    <text x="30" y="275" class="mono cyan i5">  ─── PSReadLine</text>
    <text x="30" y="292" class="mono green i5">  ✓ Already installed — skipping</text>

    <text x="30" y="316" class="mono cyan i6">  ─── Zoxide</text>
    <text x="30" y="333" class="mono yellow i6">  → Installing zoxide via winget...</text>
    <text x="30" y="350" class="mono green i7">  ✓ Done</text>

    <text x="30" y="374" class="mono border i8">  ══════════════════════════════════════════════════</text>
    <text x="30" y="392" class="mono yellow i8">  Reload your profile to apply changes:</text>
    <text x="30" y="410" class="mono white i8">    . $PROFILE</text>
    <text x="30" y="428" class="mono dim i8">  Or open a new terminal window.</text>
  </g>
</svg>
